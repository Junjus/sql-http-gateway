services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sqltojson
      POSTGRES_USER: sqltojson
      POSTGRES_PASSWORD: sqltojson
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqltojson -d sqltojson"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    volumes:
      - ./queries:/app/queries:ro
    depends_on:
      - db
    environment:
      DB_TYPE: pgx
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: sqltojson
      DB_USER: sqltojson
      DB_PASSWORD: sqltojson
    command:
      - -addr
      - :8080
      - -sql-dir
      - /app/queries
    ports:
      - "8080:8080"

volumes:
  pgdata:
